name: CI Develop - Containerized Docs

on:
  push:
    branches:
      - 'main/**'

jobs:
  pipeline:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create Documentation Directory
        run: mkdir -p documentation

      - name: Generate PDFs using Pandoc Container
        run: |
          docker run --rm \
            -v "$(pwd):/data" \
            -u $(id -u):$(id -g) \
            pandoc/extra documentation/*.md --output-dir=documentation

      - name: Check output with ls
        run: |
          echo "Verifying generated files:"
          ls -R documentation/

      - name: Build App Docker image
        run: docker build -t my-test-image .

      - name: Run App Docker container
        run: docker run my-test-image