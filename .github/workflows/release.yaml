name: CI Develop - Docs Generation

on:
  push:
    branches:
      - 'release/**'

jobs:
  pipeline:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create Documentation Directory
        run: |
          mkdir -p documentation
          echo "# Project Documentation" > documentation/readme.md
          echo "This was generated on $(date)" >> documentation/readme.md

      - name: Install Pandoc and TeX Live
        # Note: On self-hosted (Linux), you usually need a PDF engine like pdflatex
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-base texlive-fonts-recommended

      - name: Generate PDF from Markdown
        run: |
          # Convert all .md files in the documentation folder to PDFs
          for f in documentation/*.md; do
            pandoc "$f" -o "${f%.md}.pdf"
          done

      - name: Check output with ls
        run: |
          echo "Listing files in documentation directory:"
          ls -R documentation/

      - name: Build Docker image
        run: docker build -t my-test-image .

      - name: Run Docker container
        run: docker run my-test-image
